name: 'Install Docker on ARM64'
description: 'Installs Docker CE on ARM64 runners if not already present'
runs:
  using: 'composite'
  steps:
    - name: Install Docker on ARM64 runner
      shell: bash
      run: |
        # Check if Docker is already installed
        if command -v docker &> /dev/null; then
          echo "Docker is already installed: $(docker --version)"
          # Ensure docker service is running and socket is accessible
          sudo systemctl start docker || true
          # NOTE: chmod 666 grants broad permissions, but acceptable in ephemeral CI environments
          sudo chmod 666 /var/run/docker.sock || true
          exit 0
        fi

        echo "Docker not found. Installing Docker..."

        sudo apt-get remove docker docker-engine docker.io containerd runc || true

        # Repository setup
        sudo apt-get update
        sudo apt-get install -y \
            apt-transport-https \
            ca-certificates \
            curl \
            gnupg

        # GPG Key
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg

        # Setup stable repository
        echo \
          "deb [arch=arm64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu \
          $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null

        # Install Docker
        sudo apt-get update
        sudo apt-get install -y docker-ce docker-ce-cli containerd.io

        # Add usergroup
        sudo groupadd docker || true
        sudo usermod -aG docker $USER

        # Start and enable Docker service
        sudo systemctl start docker
        sudo systemctl enable docker

        # Make docker socket accessible (group membership takes effect on next login, but we need it now)
        # NOTE: chmod 666 grants broad permissions, but this is acceptable in GitHub Actions CI where:
        # - Runners are ephemeral and destroyed after each workflow run
        # - Runners are single-use and isolated environments
        # - Alternative approaches (newgrp/sg) would require wrapping all docker commands in workflows
        sudo chmod 666 /var/run/docker.sock
