name: build-test-manylinux
on:
  workflow_call:
    inputs:
      arch:
        description: "Architecture (x86_64 or aarch64)"
        required: false
        default: "x86_64"
        type: string
  workflow_dispatch: null
  # workflow_run:
  #   workflows:
  #     - build-test-core-x86
  #   types:
  #     - completed
  #   branches:
  #     - main
  #     - linux/**
  #     - dm/linux-static-build-workflow
  # push:
  #   branches:
  #     - main
  #     - linux/**
  #     - dm/linux-static-build-workflow # branch where this change was introduced

jobs:

  build-wheels:
    container: ${{ inputs.arch == 'x86_64' && 'quay.io/pypa/manylinux_2_28_x86_64' || '' }}
    runs-on: ${{ inputs.arch == 'x86_64' && 'ubuntu-latest' || 'ubuntu-24.04-arm-gh-managed' }}
    steps:
      - name: Install Docker (ARM64 only)
        if: inputs.arch != 'x86_64'
        uses: ./.github/actions/install-docker-arm64

      - name: Make checkout speedy
        run: git config --global fetch.parallel 50
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # ratchet:actions/checkout@v4
        with:
          submodules: true
      - name: Setup and build (x86_64 in container)
        if: inputs.arch == 'x86_64'
        run: |
          yum update -y --exclude=xkeyboard-config --exclude=libxkbcommon
          yum install -y zip
          echo "/opt/python/cp39-cp39/bin" >> $GITHUB_PATH
      - uses: actions/download-artifact@b14cf4c92620c250e1c074ab0a5800e37df86765 # ratchet:actions/download-artifact@v4
        with:
          name: opengrep-core-${{ inputs.arch == 'x86_64' && 'x86' || 'aarch64' }}
      - name: Build wheels (x86_64 in container)
        if: inputs.arch == 'x86_64'
        run: |
          tar xf artifacts.tgz
          cp artifacts/opengrep-core cli/src/semgrep/bin
          ./scripts/build-wheels.sh
      - name: Build wheels (ARM64 with docker)
        if: inputs.arch != 'x86_64'
        run: |
          docker run --rm \
            --volume ${{ github.workspace }}:/workspace \
            --workdir /workspace \
            quay.io/pypa/manylinux_2_28_aarch64 \
            /bin/bash -c "
              yum update -y --exclude=xkeyboard-config --exclude=libxkbcommon &&
              yum install -y zip &&
              export PATH=/opt/python/cp39-cp39/bin:\$PATH &&
              tar xf artifacts.tgz &&
              cp artifacts/opengrep-core cli/src/semgrep/bin &&
              ./scripts/build-wheels.sh
            "
      - uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # ratchet:actions/upload-artifact@v4
        with:
          name: manylinux-${{ inputs.arch == 'x86_64' && 'x86' || 'aarch64' }}-wheel
          path: cli/dist.zip

  test-wheels:
    container: ${{ inputs.arch == 'x86_64' && 'quay.io/pypa/manylinux_2_28_x86_64' || '' }}
    needs:
      - build-wheels
    runs-on: ${{ inputs.arch == 'x86_64' && 'ubuntu-latest' || 'ubuntu-24.04-arm-gh-managed' }}
    steps:
      - name: Install Docker (ARM64 only)
        if: inputs.arch != 'x86_64'
        uses: ./.github/actions/install-docker-arm64

      - uses: actions/download-artifact@b14cf4c92620c250e1c074ab0a5800e37df86765 # ratchet:actions/download-artifact@v4
        with:
          name: manylinux-${{ inputs.arch == 'x86_64' && 'x86' || 'aarch64' }}-wheel
      - name: Test (x86_64 in container)
        if: inputs.arch == 'x86_64'
        run: |
          unzip dist.zip
          /opt/python/cp39-cp39/bin/pip install dist/*.whl
          export PATH=/opt/python/cp39-cp39/bin:$PATH
          opengrep --version
          echo '1 == 1' | opengrep -l python -e '$X == $X' -
      - name: Test (ARM64 with docker)
        if: inputs.arch != 'x86_64'
        run: |
          docker run --rm \
            --volume ${{ github.workspace }}:/workspace \
            --workdir /workspace \
            quay.io/pypa/manylinux_2_28_aarch64 \
            /bin/bash -c "
              unzip dist.zip &&
              /opt/python/cp39-cp39/bin/pip install dist/*.whl &&
              export PATH=/opt/python/cp39-cp39/bin:\$PATH &&
              opengrep --version &&
              echo '1 == 1' | opengrep -l python -e '\$X == \$X' -
            "

  test-wheels-venv:
    if: inputs.arch == 'x86_64' 
    container: quay.io/pypa/manylinux_2_28_x86_64
    needs:
      - build-wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@b14cf4c92620c250e1c074ab0a5800e37df86765 # ratchet:actions/download-artifact@v4
        with:
          name: manylinux-x86-wheel
      - run: unzip dist.zip
      - name: create venv
        run: /opt/python/cp39-cp39/bin/python3 -m venv env
      - name: install package
        run: env/bin/pip install dist/*.whl
      - name: test package
        run: |
          env/bin/opengrep --version
      - name: e2e opengrep-core test
        run: |
          echo '1 == 1' | env/bin/opengrep -l python -e '$X == $X' -

  test-wheels-wsl:
    if: inputs.arch == 'x86_64' 
    needs:
      - build-wheels
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@b14cf4c92620c250e1c074ab0a5800e37df86765 # ratchet:actions/download-artifact@v4
        with:
          name: manylinux-x86-wheel
      - run: unzip dist.zip
      - uses: Vampire/setup-wsl@3b46b44374d5d0ae94654c45d114a3ed7a0e07a8 # ratchet:Vampire/setup-wsl@v5.0.1
      - name: Install Python
        run: |
          sudo sed -i '/bullseye-backports/d' /etc/apt/sources.list
          sudo apt update -y
          sudo apt install -y make python3 python3-pip
          sudo ln -s /usr/bin/python3 /usr/bin/python
        shell: wsl-bash {0}
      - name: install package
        run: python3 -m pip install dist/*.whl
        shell: wsl-bash {0}
      - name: test package
        run: |
          opengrep --version
        shell: wsl-bash {0}
      - name: e2e opengrep-core test
        run: |
          echo '1 == 1' | opengrep -l python -e '$X == $X' -
        shell: wsl-bash {0}

